name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    name: ${{ matrix.name }}
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - name: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
          - name: Windows x64
            platform: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust with macOS targets
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Rust
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            if [ -n "$APPLE_API_KEY" ] || [ -n "$APPLE_API_ISSUER" ] || [ -n "$APPLE_API_PRIVATE_KEY" ] || [ -n "$APPLE_ID" ] || [ -n "$APPLE_PASSWORD" ]; then
              echo "::error::Apple notarization secrets are configured, but APPLE_CERTIFICATE is missing."
              exit 1
            fi
            echo "APPLE_CERTIFICATE is not configured; macOS build will be unsigned."
            exit 0
          fi

          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::error::APPLE_CERTIFICATE_PASSWORD and KEYCHAIN_PASSWORD are required when APPLE_CERTIFICATE is configured."
            exit 1
          fi

          HAS_API_KEY_AUTH=false
          if [ -n "$APPLE_API_KEY" ] || [ -n "$APPLE_API_ISSUER" ] || [ -n "$APPLE_API_PRIVATE_KEY" ]; then
            if [ -z "$APPLE_API_KEY" ] || [ -z "$APPLE_API_ISSUER" ] || [ -z "$APPLE_API_PRIVATE_KEY" ]; then
              echo "::error::APPLE_API_KEY, APPLE_API_ISSUER, and APPLE_API_PRIVATE_KEY must be configured together."
              exit 1
            fi
            HAS_API_KEY_AUTH=true
          fi

          HAS_APPLE_ID_AUTH=false
          if [ -n "$APPLE_ID" ] || [ -n "$APPLE_PASSWORD" ]; then
            if [ -z "$APPLE_ID" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
              echo "::error::APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID must be configured together."
              exit 1
            fi
            HAS_APPLE_ID_AUTH=true
          fi

          if [ "$HAS_API_KEY_AUTH" = false ] && [ "$HAS_APPLE_ID_AUTH" = false ]; then
            echo "::error::Signed macOS releases require notarization auth. Configure App Store Connect API key secrets, or APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/apple-signing-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/apple-signing.keychain-db"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$APPLE_SIGNING_IDENTITY"
          if [ -z "$SIGNING_IDENTITY" ]; then
            SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          fi

          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "::error::No Developer ID Application signing identity found in the imported certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          if [ "$HAS_API_KEY_AUTH" = true ]; then
            API_KEY_DIR="$RUNNER_TEMP/private_keys"
            API_KEY_PATH="$API_KEY_DIR/AuthKey_${APPLE_API_KEY}.p8"
            mkdir -p "$API_KEY_DIR"
            printf '%s' "$APPLE_API_PRIVATE_KEY" > "$API_KEY_PATH"
            chmod 600 "$API_KEY_PATH"
            echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Build and upload draft release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_KEY: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_ISSUER: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Agent Skills Manager v__VERSION__"
          releaseBody: |
            Preview build for local-first skill management.

            These installers are generated by GitHub Actions from the Tauri release workflow. macOS builds are signed and notarized when Apple Developer secrets are configured. Windows and Linux may show platform-specific warnings until their signing paths are configured.
          releaseDraft: true
          prerelease: true
          generateReleaseNotes: true
          args: ${{ matrix.args }}
